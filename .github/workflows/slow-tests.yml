name: Slow tests

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  slow-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
      - name: Run slow release tests
        run: cargo test --release --features slow_tests --lib --tests
